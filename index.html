<!-- ════════════════════════════════════════════════════════
     CSS — ULKOASU
     Kaikki visuaalinen muotoilu on tässä <style>-lohkossa.
     Selain lukee nämä säännöt ja soveltaa ne HTML-elementteihin.
     ════════════════════════════════════════════════════════ -->
<style>

/* ── Nollaus ──
   Selaimet lisäävät oletuksena margineja ja täytteitä eri elementeille.
   Tämä nollaa ne kaikki, jotta ulkoasu on yhtenäinen eri selaimissa.
   box-sizing: border-box tarkoittaa että leveys/korkeus lasketaan
   reunukset ja täytteet mukaan lukien — helpottaa laskemista. */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Sivun pohja ── */
body {
  background: #0d0f1a;       /* Sivun taustaväri — tumma yötaivas. Vaihda tätä muuttaaksesi taustan. */
  color: #e2d9c0;            /* Perustekstien väri — lämmin valkoinen. */
  font-family: 'DM Mono', monospace; /* Käytetty fontti. monospace = varmuusfontti jos DM Mono ei lataudu. */
  font-size: 13px;           /* Perustekstin koko. Kasvata esim. 15px jos teksti tuntuu pieneltä. */
  padding: 16px;             /* Sivun reunojen sisätäyte — etäisyys reunasta sisältöön */
  max-width: 580px;          /* Sisältö ei levene yli 580px vaikka ruutu olisi leveämpi */
  margin: 0 auto;            /* Keskittää sisällön vaakasuunnassa kun ruutu on leveä */
}

/* ── Yläpalkki (otsikko + kello) ── */
.topbar {
  display: flex;                    /* Flex = elementit asettuvat vierekkäin */
  justify-content: space-between;  /* Tyhjä tila jaetaan väliin — otsikko vasemmalle, kello oikealle */
  align-items: baseline;           /* Tasataan tekstien pohjalinja */
  border-bottom: 1px solid #2a2d3e; /* Ohut viiva alle — erottaa yläpalkin muusta sisällöstä */
  padding-bottom: 8px;
  margin-bottom: 14px;
}
.topbar-title {
  font-size: 11px;
  color: #6b6880;          /* Harmaa — vähemmän tärkeä tieto häivytetään */
  letter-spacing: 0.15em;  /* Kirjainten välitys — antaa tyylikkään ilmeen */
  text-transform: uppercase; /* Muuttaa tekstin ISOIKSI kirjaimiksi automaattisesti */
}
#clock {
  font-size: 20px;
  color: #fbbf24;  /* Keltainen kello. Vaihda tätä väriä muuttaaksesi kellon väriä. */
  letter-spacing: 0.05em;
}

/* ── Tänään-ruudukko (4 solua: nousu / lasku / pituus / muutos) ── */
.today-grid {
  display: grid;                       /* Grid = ruudukkoasettelu */
  grid-template-columns: 1fr 1fr 1fr 1fr; /* 4 yhtä leveää saraketta. 1fr = 1 osa käytettävissä olevasta tilasta. */
  gap: 1px;                            /* 1px rako solujen väliin — background-väri näkyy siinä viivana */
  background: #2a2d3e;                 /* Tämä väri näkyy solujen välisissä 1px-raoissa */
  border: 1px solid #2a2d3e;
  border-radius: 6px;                  /* Pyöristetyt kulmat */
  overflow: hidden;                    /* Solujen kulmat eivät törröttele pyöristyksen yli */
  margin-bottom: 14px;
}
.tg-cell { background: #13151f; padding: 10px 12px; } /* Yksittäinen solu — tumma tausta ja täyte */
.tg-label {
  font-size: 9px; color: #6b6880;
  text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 4px;
  /* Pieni harmaa otsikko solun yläosassa, esim. "NOUSU" */
}
.tg-val { font-size: 18px; color: #fbbf24; letter-spacing: 0.02em; line-height: 1.1; }
/* Iso arvo solun keskellä. Väri ylikirjoitetaan alla olevilla luokilla: */
.tg-val.rise  { color: #fde68a; } /* Nousuaika — vaalea keltainen */
.tg-val.set   { color: #fb923c; } /* Laskuaika — oranssi */
.tg-val.len   { color: #a3e635; } /* Päivän pituus — vihreä */
.tg-val.diff  { font-size: 15px; } /* Muutos-arvo — hieman pienempi */
.tg-val.plus  { color: #4ade80; } /* Positiivinen muutos — vihreä */
.tg-val.minus { color: #f87171; } /* Negatiivinen muutos — punainen */
.tg-sub { font-size: 9px; color: #6b6880; margin-top: 3px; }
/* Pieni teksti solun alla, esim. päivämäärä tai "vs. eilen" */

/* ── Tilapalkki (vilkkuva piste + teksti) ── */
.statusbar {
  background: #13151f; border: 1px solid #2a2d3e;
  border-radius: 6px; padding: 7px 12px;
  display: flex; align-items: center; gap: 8px; /* Flex: piste ja teksti vierekkäin */
  margin-bottom: 14px; font-size: 12px; color: #a09888;
}
.dot {
  width: 6px; height: 6px; background: #fbbf24;
  border-radius: 50%;   /* 50% = täydellinen ympyrä */
  flex-shrink: 0;       /* Piste ei pienene vaikka teksti veisi tilaa */
  animation: blink 2s ease-in-out infinite; /* Vilkutusanimaatio, määritelty alla */
}
/* Vilkutusanimaatio: opacity 1 → 0.2 → 1 kahden sekunnin syklissä */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── Osion otsikko (pieni harmaa teksti ennen taulukkoa ja graafin) ── */
.section-label {
  font-size: 9px; color: #6b6880;
  text-transform: uppercase; letter-spacing: 0.2em;
  margin-bottom: 6px; padding-left: 2px;
}

/* ── Ennustetaulukko ── */
.fc-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
/* border-collapse: collapse = solujen reunat yhdistyvät eikä tule kaksinkertaisia viivoja */

.fc-table th {
  /* Taulukon otsikkosarakkeet (Pvm, Nousu, Lasku...) */
  font-size: 9px; color: #6b6880; text-transform: uppercase;
  letter-spacing: 0.12em; font-weight: 400; /* 400 = normaali, ei lihavoitu */
  text-align: left;
  padding: 0 8px 5px; border-bottom: 1px solid #2a2d3e;
}
.fc-table th:not(:first-child) { text-align: right; }
/* Kaikki muut otsikot paitsi ensimmäinen (päivämäärä) oikealle */

.fc-table td {
  /* Taulukon tietosolut */
  padding: 5px 8px; border-bottom: 1px solid #191b28; vertical-align: middle;
}
.fc-table tr:last-child td { border-bottom: none; } /* Viimeisellä rivillä ei alaviivaa */
.fc-table tr:hover td { background: #161825; } /* Rivi vaalentuu kun hiiri on päällä */
.fc-table tr.today-row td { background: #181b28; } /* Tänään-rivi on hieman vaaleampi */
.fc-table tr.today-row .fc-day { color: #fbbf24; } /* Tänään-päivämäärä keltaisella */

/* Taulukon sarakkeiden värit */
.fc-day  { color: #e2d9c0; font-size: 12px; }  /* Päivämäärä — valkoinen */
.fc-rise { color: #fde68a; text-align: right; font-size: 12px; } /* Nousu — keltainen */
.fc-set  { color: #fb923c; text-align: right; font-size: 12px; } /* Lasku — oranssi */
.fc-len  { color: #a09888; text-align: right; font-size: 12px; } /* Pituus — harmaa */
.fc-diff { text-align: right; font-size: 11px; } /* Muutos — väri riippuu arvosta: */
.fc-diff.plus  { color: #4ade80; } /* Päivä pitenee — vihreä */
.fc-diff.minus { color: #f87171; } /* Päivä lyhenee — punainen */
.fc-diff.zero  { color: #6b6880; } /* Ei muutosta — harmaa */

/* ── Graafi-alue ── */
.chart-wrap {
  background: #13151f; border: 1px solid #2a2d3e;
  border-radius: 6px; padding: 12px 12px 8px;
  margin-bottom: 14px;
  position: relative; /* Tarvitaan tooltip-paikkauksen vuoksi — tooltip sijoitetaan tämän sisään */
}
#sunChart { display: block; width: 100%; cursor: crosshair; }
/* cursor: crosshair = ristikohdistin kun hiiri on graafin päällä */

.chart-tooltip {
  /* Popup joka näkyy kun hiiri on graafin päällä */
  position: absolute;    /* Sijoitetaan suhteessa .chart-wrap-elementtiin */
  background: #0d0f1a;
  border: 1px solid #3a3d52; border-radius: 5px;
  padding: 6px 10px; font-size: 11px; color: #e2d9c0;
  pointer-events: none;  /* Hiiri "läpäisee" tooltipin — ei häiritse graafin käyttöä */
  opacity: 0;            /* Piilotettu oletuksena, näytetään JS:ssä */
  transition: opacity 0.1s; /* Häivytys 0.1 sekunnissa kun näytetään/piilotetaan */
  white-space: nowrap;   /* Teksti pysyy yhdellä rivillä */
  z-index: 10;           /* Tulee muiden elementtien päälle */
  line-height: 1.7;
}

/* ── Alatunniste ── */
.footer { font-size: 10px; color: #3a3d52; text-align: right; letter-spacing: 0.08em; }

</style>

<!-- ════════════════════════════════════════════════════════
     JAVASCRIPT — LOGIIKKA
     Kaikki laskenta ja dynaaminen sisältö tapahtuu täällä.
     ════════════════════════════════════════════════════════ -->
<script>

// ── Sijainnin koordinaatit ──────────────────────────────────────────────────
// Nämä kaksi muuttujaa määrittävät laskentapaikan.
// Jos haluat vaihtaa kaupunkia, muuta nämä arvot.
// Helsinki: LAT=60.1699, LON=24.9384
// Tampere:  LAT=61.4978, LON=23.7610
const LAT = 60.1699; // Leveysaste (latitude) — pohjoinen/etelä
const LON = 24.9384; // Pituusaste (longitude) — itä/länsi


// ── Kesä-/talviaika (DST) ──────────────────────────────────────────────────
// Suomessa kellonaika on talvella UTC+2 (EET) ja kesällä UTC+3 (EEST).
// Siirtymät tapahtuvat viimeisenä sunnuntaina maaliskuuta ja lokakuuta.

function getDST(date) {
  // Palauttaa aikavyöhykkeen offsetin tunteina (2 tai 3)
  const y = date.getFullYear();
  const s = lastSun(y, 2); // Kesäajan alku: viimeinen su maaliskuussa (kuukausi-indeksi 2)
  const e = lastSun(y, 9); // Kesäajan loppu: viimeinen su lokakuussa (kuukausi-indeksi 9)
  return (date >= s && date < e) ? 3 : 2;
  // Ternary-operaattori: jos päivä on kesäajan sisällä → 3, muuten → 2
}

function lastSun(y, m) {
  // Laskee kuukauden viimeisen sunnuntain
  // new Date(y, m+1, 0) = kuukauden viimeinen päivä (päivä 0 seuraavassa kuussa)
  const d = new Date(y, m + 1, 0);
  // getDay() palauttaa viikonpäivän: 0=su, 1=ma, ..., 6=la
  // Vähennetään viikonpäivä jotta palataan taaksepäin sunnuntaihin
  d.setDate(d.getDate() - d.getDay());
  return d;
}


// ── Juliuksen päivämäärä ────────────────────────────────────────────────────
function toJD(d) {
  // Muuntaa JavaScript-päivämäärän Juliuksen päiväluvuksi (JD).
  // JD on astronomien käyttämä jatkuva päivälaskuri joka alkaa vuodesta 4713 eKr.
  // Tätä tarvitaan aurinkolaskuissa koska astronomian kaavat käyttävät sitä.
  // d.getTime() palauttaa millisekunnit Unix-epochista (1.1.1970)
  return d.getTime() / 86400000 + 2440587.5;
  // 86400000 = millisekunnit vuorokaudessa (1000ms * 60s * 60min * 24h)
  // 2440587.5 = JD-arvo 1.1.1970 (Unix-epochin JD-vastine)
}


// ── Auringonnousu- ja laskuajat (Jean Meeus -algoritmi) ───────────────────
function calcSun(date) {
  // Laskee auringonnousun ja -laskun kellonajat (desimaalitunteina) annetulle päivälle.
  // Palauttaa objektin { rise: 6.23, set: 20.45 } tai null (kesäyö / kaamos).

  const tz = getDST(date); // Aikavyöhyke tunteina

  // Lasketaan kello 12:00 UTC kyseiseltä päivältä (päivänkeskipäivä)
  const JD = toJD(new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate(), 12)));

  // n = päivien lukumäärä J2000.0-epochista (1.1.2000 kello 12 UTC)
  const n = JD - 2451545.0;

  // L = auringon keskimääräinen pituusaste (degrees)
  const L = (280.46 + 0.9856474 * n) % 360;

  // g = auringon keskianomalia (radiaaneina) — kuvaa Maan sijaintia elliptisellä radallaan
  const g = ((357.528 + 0.9856003 * n) % 360) * Math.PI / 180;

  // lam = auringon ekliptinen pituusaste (radiaaneina) — korjattu elliptisyyden mukaan
  const lam = (L + 1.915 * Math.sin(g) + 0.02 * Math.sin(2 * g)) * Math.PI / 180;

  // eps = maapallon akselin kallistuskulma (radiaaneina), noin 23.4°
  const eps = 23.439 * Math.PI / 180;

  // sinDec = auringon deklinaation sini — deklinaatio = auringon "leveysaste" taivaalla
  const sinDec = Math.sin(eps) * Math.sin(lam);
  const dec = Math.asin(sinDec); // Itse deklinaatio radiaaneina

  // cosHA = tuntikulman kosini — tuntikulma kertoo milloin aurinko on horisontissa
  // -0.8333° = auringon "koko" + ilmakehän taittuminen (aurinko näkyy jo kun se on vähän alla)
  const cosHA = (Math.sin(-0.8333 * Math.PI / 180) - Math.sin(LAT * Math.PI / 180) * sinDec)
              / (Math.cos(LAT * Math.PI / 180) * Math.cos(dec));

  // Jos |cosHA| > 1, aurinko ei laske (kesäyö) tai nouse (kaamos) — palautetaan null
  if (Math.abs(cosHA) > 1) return null;

  const HA = Math.acos(cosHA) * 180 / Math.PI; // Tuntikulma asteina

  // EoT = Equation of Time — korjaus auringon epätasaiselle liikkeelle (minuuteissa)
  const EoT = (-7.655 * Math.sin(g) + 9.873 * Math.sin(2 * lam + 3.588) + 0.439 * Math.sin(4 * lam)) / 60;

  // Paikallinen auringon keskipäivä (desimaalitunteina)
  const noon = 12 - (LON - 15 * tz) / 15 - EoT;

  // Nousu = keskipäivä miinus tuntikulma, lasku = keskipäivä plus tuntikulma
  return {
    rise: noon - HA / 15, // HA/15 muuntaa asteet tunneiksi (360° = 24h → 1h = 15°)
    set:  noon + HA / 15
  };
}


// ── Apufunktiot aikojen muotoiluun ─────────────────────────────────────────

function fmt(h) {
  // Muuntaa desimaalitunnit "HH:MM"-muotoon, esim. 6.25 → "06:15"
  if (h == null) return '--:--'; // Jos arvo puuttuu, näytetään viivat
  const hh = Math.floor(h) % 24;          // Kokonaistunnit, % 24 estää yli 24h
  const mm = Math.round((h % 1) * 60) % 60; // Minuutit: desimaaliosa × 60
  // padStart(2,'0') lisää etunollan jos luku on alle 10, esim. 6 → "06"
  return String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
}

function fmtLen(h) {
  // Muuntaa desimaalitunnit "Xh YYm"-muotoon, esim. 14.5 → "14h 30m"
  const t = Math.round(h * 60); // Kokonaisminuutit
  return Math.floor(t / 60) + 'h ' + String(t % 60).padStart(2, '0') + 'm';
}


// ── Nimikokoelmat ──────────────────────────────────────────────────────────
// Taulukot (arrays) suomenkielisistä nimistä. Indeksi 0 = sunnuntai/tammikuu jne.
// Jos haluat vaihtaa kieltä, muuta nämä.
const DAYS = ['Su', 'Ma', 'Ti', 'Ke', 'To', 'Pe', 'La'];
const MONS = ['tam', 'hel', 'maa', 'huh', 'tou', 'kes', 'hei', 'elo', 'syy', 'lok', 'mar', 'jou'];


// ── Päivitysfunktio — ajetaan kerran sekunnissa ────────────────────────────
function update() {
  const now = new Date(); // Nykyinen aika

  // Päivitetään kello — padStart varmistaa kaksi numeroa (esim. "09" eikä "9")
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0') + ':' +
    String(now.getSeconds()).padStart(2, '0');

  const sun = calcSun(now); // Lasketaan tämän päivän nousu/lasku
  if (!sun) return;         // Jos kaamos/keskiyöaurinko, lopetetaan tähän

  // Päivitetään nousu- ja laskuajat
  document.getElementById('riseTime').textContent = fmt(sun.rise);
  document.getElementById('setTime').textContent  = fmt(sun.set);

  // Päivitetään päivämäärä noususolun alle, esim. "Ti 18. maa"
  document.getElementById('todayDate').textContent =
    DAYS[now.getDay()] + ' ' + now.getDate() + '. ' + MONS[now.getMonth()];

  // Päivän pituus = lasku miinus nousu (desimaalitunteina)
  const len = sun.set - sun.rise;
  document.getElementById('dayLen').textContent = fmtLen(len);

  // Muutos eiliseen: lasketaan eilen ja verrataan
  // new Date(now - 86400000) = eilen (vähennetään millisekunnit vuorokaudessa)
  const yest = calcSun(new Date(now - 86400000));
  if (yest) {
    const diff = Math.round((len - (yest.set - yest.rise)) * 60); // Muutos minuuteissa
    const el = document.getElementById('dayDiff');
    el.textContent = (diff >= 0 ? '+' : '') + diff + 'min'; // + eteen jos positiivinen
    // Vaihdetaan CSS-luokka värin mukaan: plus=vihreä, minus=punainen
    el.className = 'tg-val diff ' + (diff > 0 ? 'plus' : diff < 0 ? 'minus' : '');
  }

  // ── Tilapalkin teksti ──
  // nowH = nykyinen aika desimaalitunteina, esim. 14:30 → 14.5
  const nowH = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
  const isDay = nowH >= sun.rise && nowH <= sun.set; // Onko aurinko nyt yllä?

  let status;
  if (isDay) {
    // Aurinko on yllä — lasketaan kuinka kauan se on vielä yllä
    const left = Math.round((sun.set - nowH) * 60); // Jäljellä olevat minuutit
    status = `Aurinko laskee ${fmt(sun.set)} — jäljellä ${Math.floor(left / 60) > 0 ? Math.floor(left / 60) + 'h ' : ''}${left % 60}min`;
  } else if (nowH < sun.rise) {
    // Yö ennen nousua — lasketaan kuinka kauan nousuun
    const mins = Math.round((sun.rise - nowH) * 60);
    status = `Aurinko nousee ${fmt(sun.rise)} — ${Math.floor(mins / 60) > 0 ? Math.floor(mins / 60) + 'h ' : ''}${mins % 60}min kuluttua`;
  } else {
    // Yö auringonlaskun jälkeen — katsotaan huomisen nousu
    const tom = new Date(now);
    tom.setDate(tom.getDate() + 1); // Huominen päivä
    const ts = calcSun(tom);
    const mins = ts ? Math.round((ts.rise + 24 - nowH) * 60) : null;
    // ts.rise + 24 koska ollaan jo ylitetty puoliyö (nousu on "huomenna")
    status = `Aurinko nousee huomenna ${ts ? fmt(ts.rise) : '--:--'} — ${mins && Math.floor(mins / 60) > 0 ? Math.floor(mins / 60) + 'h ' : ''}${mins ? mins % 60 : 0}min kuluttua`;
  }
  document.getElementById('nowStatus').textContent = status;
}


// ── Ennustetaulukko ────────────────────────────────────────────────────────
function renderForecast() {
  // Täyttää taulukon riveillä tänään + seuraavat 14 päivää.
  // Ajetaan kerran sivun latautuessa — data ei muutu nopeasti joten ei tarvitse päivittää.

  const tbody = document.getElementById('fcBody'); // Taulukon runko-elementti
  const today = new Date();
  tbody.innerHTML = ''; // Tyhjennetään ensin (varmuuden vuoksi)

  for (let i = 0; i <= 14; i++) {
    // Luodaan päivämäärä-objekti i päivää tästä eteenpäin
    const d = new Date(today);
    d.setDate(d.getDate() + i); // setDate muuttaa päivää, hoitaa kuukauden vaihdon automaattisesti

    const s = calcSun(d);
    if (!s) continue; // Jos kaamos/keskiyöaurinko, ohitetaan tämä päivä

    const len = s.set - s.rise; // Päivän pituus tunteina

    // Vertailupäivä = edellinen päivä muutoksen laskemiseksi
    const prev = calcSun(new Date(d - 86400000));
    const diff = prev ? Math.round((len - (prev.set - prev.rise)) * 60) : 0;

    // Luodaan taulukon rivi (<tr>) ja lisätään solut (<td>)
    const tr = document.createElement('tr');
    if (i === 0) tr.className = 'today-row'; // Tänään saa erityiskorostuksen

    // innerHTML = HTML-merkkijono suoraan elementin sisään
    // Template literals (backtick ``) mahdollistavat muuttujat ${} merkkijonon sisällä
    tr.innerHTML = `
      <td class="fc-day">${DAYS[d.getDay()]} ${d.getDate()}.${d.getMonth() + 1}.</td>
      <td class="fc-rise">${fmt(s.rise)}</td>
      <td class="fc-set">${fmt(s.set)}</td>
      <td class="fc-len">${fmtLen(len)}</td>
      <td class="fc-diff ${diff > 0 ? 'plus' : diff < 0 ? 'minus' : 'zero'}">
        ${diff === 0 ? '—' : (diff > 0 ? '+' : '') + diff + 'min'}
      </td>
    `;
    tbody.appendChild(tr); // Lisätään rivi taulukkoon
  }
}


// ── Graafi ─────────────────────────────────────────────────────────────────
function renderChart() {
  // Piirtää canvas-elementtiin päivän pituuden 92 päivän ajalta (tänään + 3kk).
  // Ajetaan sivun latautuessa ja aina kun selainikkuna muuttaa kokoa.

  const canvas  = document.getElementById('sunChart');
  const tooltip = document.getElementById('chartTooltip');
  const card    = document.getElementById('chartCard'); // Graafin ympärys-div
  const dpr = window.devicePixelRatio || 1;
  // devicePixelRatio: Retina-näytöillä on 2x tai 3x pikselitiheys.
  // Piirretään suuremmalle canvasille ja skaalataan CSS:llä — näin graafi pysyy terävänä.

  // Reunukset graafin sisällä (pikseleinä): top/right/bottom/left
  // Näihin mahtuvat asteikkomerkinnät ja kuukausinimet
  const PAD = { top: 14, right: 10, bottom: 28, left: 38 };

  // Graafin fyysinen leveys = kortin leveys miinus täytteet
  const W = card.clientWidth - 24;
  const H = 160; // Graafin korkeus pikseleinä — kasvata tätä saadaksesi korkeamman graafin

  // Asetetaan canvas-elementin pikselimäärä (fyysinen koko × pikselitiheys)
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  // CSS-koko pysyy samana — retina-näytöllä piirretään 2× tarkkuudella
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d'); // 2D-piirtokonteksti — kaikki piirtokomennot tämän kautta
  ctx.scale(dpr, dpr);   // Skaalataan kaikki piirtokomennot retinaa varten
  ctx.clearRect(0, 0, W, H); // Tyhjennetään canvas ennen uudelleenpiirtoa

  // ── Lasketaan 92 päivän data ──
  const today = new Date();
  const data = [];
  for (let i = 0; i <= 91; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const s = calcSun(d);
    // Jos kaamos/keskiyöaurinko (s=null), käytetään edellistä arvoa
    const len = s ? s.set - s.rise : (data[i - 1]?.len ?? 0);
    // ?. = optional chaining: data[i-1]?.len ei kaadu vaikka data[i-1] olisi undefined
    // ?? = nullish coalescing: käytä 0 jos arvo on null tai undefined
    data.push({ date: new Date(d), len, rise: s?.rise ?? null, set: s?.set ?? null });
  }

  // ── Koordinaattimuunnokset ──
  const minL = 5;  // Graafin alin arvo (tuntia) — kaamos Helsingissä ~5.8h
  const maxL = 21; // Graafin ylin arvo — juhannuksena ~18.8h
  const iW = W - PAD.left - PAD.right;  // Piirtoalueen leveys
  const iH = H - PAD.top  - PAD.bottom; // Piirtoalueen korkeus

  // xF(i) = x-koordinaatti indeksille i (0..91)
  const xF = i => PAD.left + (i / (data.length - 1)) * iW;

  // yF(l) = y-koordinaatti päivän pituudelle l (tunteina)
  // Canvas: y=0 on YLHÄÄLLÄ, joten käännetään: iso arvo → pieni y-koordinaatti
  const yF = l => PAD.top + iH - ((Math.min(Math.max(l, minL), maxL) - minL) / (maxL - minL)) * iH;
  // Math.min/max rajaa arvon välille [minL, maxL] jottei mene reunan yli

  // ── Vaakaviivat ja y-akselin merkinnät ──
  ctx.font = `9px 'DM Mono', monospace`;
  [6, 9, 12, 15, 18].forEach(h => {
    const y = yF(h);
    // Piirretään viivakatko vasemmasta reunasta oikeaan
    ctx.beginPath();
    ctx.moveTo(PAD.left, y);
    ctx.lineTo(PAD.left + iW, y);
    ctx.strokeStyle = '#1e2030'; // Viivan väri — tumma häivähdys
    ctx.lineWidth = 1;
    ctx.stroke();
    // Kirjoitetaan tuntimerkkaus vasemmalle
    ctx.fillStyle = '#6b6880';
    ctx.textAlign = 'right';
    ctx.fillText(h + 'h', PAD.left - 5, y + 3);
  });

  // ── Kuukauden vaihdon pystyviivat ja nimet ──
  let lastM = -1; // Muistetaan edellinen kuukausi jottei piirretä samaa kahdesti
  data.forEach((d, i) => {
    const m = d.date.getMonth(); // 0–11
    if (m !== lastM) {
      lastM = m;
      const x = xF(i);
      // Pieni pystyviiva x-akselilla
      ctx.beginPath();
      ctx.moveTo(x, PAD.top + iH);
      ctx.lineTo(x, PAD.top + iH + 3);
      ctx.strokeStyle = '#3a3d52';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Kuukauden nimi pystyviivan oikealle puolelle
      ctx.fillStyle = '#6b6880';
      ctx.textAlign = 'left';
      ctx.fillText(MONS[m], x + 2, H - 4);
    }
  });

  // ── Täyttöalue käyrän alla (gradient) ──
  // Luodaan vertikaalinen liukuvärjäys: yläosa läpikuultava keltainen, alaosa lähes läpinäkyvä
  const grad = ctx.createLinearGradient(0, PAD.top, 0, PAD.top + iH);
  grad.addColorStop(0, 'rgba(251,191,36,0.18)'); // Keltainen 18% läpinäkyvyydellä
  grad.addColorStop(1, 'rgba(251,191,36,0.02)'); // Lähes läpinäkyvä alhaalla
  // Piirretään suljettu muoto käyrästä alas vasempaan kulmaan ja takaisin
  ctx.beginPath();
  ctx.moveTo(xF(0), yF(data[0].len));
  data.forEach((d, i) => ctx.lineTo(xF(i), yF(d.len))); // Käyrän pisteet
  ctx.lineTo(xF(data.length - 1), PAD.top + iH); // Alas oikeaan
  ctx.lineTo(xF(0), PAD.top + iH);               // Vasempaan alakulmaan
  ctx.closePath(); // Suljetaan muoto
  ctx.fillStyle = grad;
  ctx.fill();

  // ── Käyrä ──
  ctx.beginPath();
  ctx.moveTo(xF(0), yF(data[0].len));
  data.forEach((d, i) => ctx.lineTo(xF(i), yF(d.len)));
  ctx.strokeStyle = '#fbbf24'; // Keltainen viiva — vaihda väriä tästä
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round'; // Pyöristetyt kulmat käyrässä
  ctx.stroke();

  // ── Tänään-piste ──
  ctx.beginPath();
  ctx.arc(xF(0), yF(data[0].len), 3, 0, Math.PI * 2); // Ympyrä säteellä 3px
  ctx.fillStyle = '#fbbf24';
  ctx.fill();

  // ── Hover-tooltip (hiiren liike graafin päällä) ──
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect(); // Canvas-elementin sijainti ruudulla
    const mx = e.clientX - rect.left; // Hiiren x-koordinaatti suhteessa canvakseen

    // Jos hiiri on graafin piirtoalueen ulkopuolella, piilotetaan tooltip
    if (mx < PAD.left || mx > PAD.left + iW) {
      tooltip.style.opacity = '0';
      return;
    }

    // Lasketaan mikä data-indeksi vastaa hiiren x-sijaintia
    const idx = Math.max(0, Math.min(
      data.length - 1,
      Math.round(((mx - PAD.left) / iW) * (data.length - 1))
    ));

    const d  = data[idx];
    const dd = d.date;

    // Rakennetaan tooltip-sisältö HTML:nä
    tooltip.innerHTML =
      `<span style="color:#fbbf24">${DAYS[dd.getDay()]} ${dd.getDate()}.${dd.getMonth() + 1}.</span><br>` +
      `↑ ${fmt(d.rise)} &nbsp; ↓ ${fmt(d.set)}<br>` +
      `☀ ${fmtLen(d.len)}`;

    // Sijoitetaan tooltip hiiren lähelle, mutta ei ruudun reunan yli
    const cr = card.getBoundingClientRect();
    let tx = e.clientX - cr.left + 10;   // 10px hiiren oikealle puolelle
    let ty = e.clientY - cr.top - 70;    // 70px ylös
    if (tx + 145 > card.clientWidth) tx -= 160; // Jos menisi oikealta yli, siirretään vasemmalle
    if (ty < 4) ty = 4;                         // Ei yli yläreunasta
    tooltip.style.left    = tx + 'px';
    tooltip.style.top     = ty + 'px';
    tooltip.style.opacity = '1'; // Näytetään tooltip
  };

  // Piilotetaan tooltip kun hiiri poistuu graafin päältä
  canvas.onmouseleave = () => { tooltip.style.opacity = '0'; };
}


// ── Käynnistys ─────────────────────────────────────────────────────────────
// Nämä rivit ajetaan heti kun selain on ladannut skriptin.

renderForecast();         // Täytetään taulukko kerran
renderChart();            // Piirretään graafi kerran
update();                 // Päivitetään ajat heti
setInterval(update, 1000); // Ja sen jälkeen kerran sekunnissa (1000ms = 1s)
window.addEventListener('resize', renderChart);
// Kun selainikkuna muuttaa kokoa, piirretään graafi uudelleen oikeaan leveyteen


// ── Service Worker (PWA offline-tuki) ─────────────────────────────────────
// Service worker on taustaohjelma joka tallentaa sivun välimuistiin.
// Näin sovellus toimii myös ilman verkkoyhteyttä.
if ('serviceWorker' in navigator) {
  // Tarkistetaan ensin että selain tukee service workereita (kaikki modernit tukevat)
  window.addEventListener('load', () => {
    // Rekisteröidään sw.js vasta kun sivu on kokonaan latautunut
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW registration failed:', err));
      // .catch = jos rekisteröinti epäonnistuu, tulostetaan varoitus konsoliin
      // Sovellus toimii silti, vain offline-tuki puuttuu
  });
}

</script>
